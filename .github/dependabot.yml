version: 2
updates:
  # All Maven updates land in ONE grouped PR (minor + patch only).
  # Major bumps are ignored so they never auto-PR — Boot 4 / Spring Framework 7
  # / Spring AI 2.0 are deliberate migrations done by hand, not by the bot.
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      maven:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      # No automatic major bumps anywhere — Boot 4 / Spring Framework 7 /
      # Spring AI 2.0 are deliberate, hand-driven migrations.
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
      # Spring AI changes its public API on MINOR bumps (1.0 -> 1.1 broke the
      # checkpoint codec's AssistantMessage / ToolResponseMessage usage), so
      # only patch updates (1.0.x) are allowed automatically; minor is manual.
      - dependency-name: "org.springframework.ai:*"
        update-types:
          - "version-update:semver-minor"

  # GitHub Actions, also grouped into one PR.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
